        .translator {
            display: flex;
            align-items: center;

        .translator textarea {
            font-family: "Manrope", sans-serif;
            width: 100%;
            height: 200px;
            margin: 10px;
            padding: 15px;
            padding-right: 40px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            resize: none;
            outline: none;
            transition: all 0.25s ease;
        }

        .translator textarea:hover {
            box-shadow: 0 10px 10px -10px #ccc;
        }

        .translator textarea:focus {
            box-shadow: 0 10px 10px -10px #ccc;
        }

        .translator button {
            font-family: "Manrope", sans-serif;
            width: calc(50% - 20px);
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #8f36f5;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            outline: none;
        }

        .translator button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .translator button:hover:enabled {
            background-color: #a561f2;
            box-shadow: 0 10px 10px -10px #a561f2;
        }

        #tts button {
            font-family: "Manrope", sans-serif;
            width: calc(50% - 20px);
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            outline: none;
            background-color: #f24e24;
        }

        #tts button:disabled {
            background-color: #ccc;

        #tts button:hover:enabled {
            background-color: #f7724f;

        .checkbox-wrapper-28 {
            margin-top: 10px;

        .checkbox-wrapper-28 *:before,
        .checkbox-wrapper-28 *:after {
            box-sizing: border-box;
        }

        .checkbox-wrapper-28 .promoted-input-checkbox {
            border: 0;
            clip: rect(0 0 0 0);
            height: 1px;
            margin: -1px;
            overflow: hidden;
            padding: 0;
            position: absolute;
            width: 1px;

            stroke: #6e6e6e;
            stroke-width: 3px;
            height: calc(var(--size) * 0.6);
            width: calc(var(--size) * 0.6);
            position: absolute;
            left: calc(var(--size) * 0.21);
            top: calc(var(--size) * 0.2);
            stroke-dasharray: 33;
            opacity: 0;
        }

        .checkbox-wrapper-28 input:checked~svg {
            -webkit-animation: draw-checkbox-28 ease-in-out 0.25s forwards;
            animation: draw-checkbox-28 ease-in-out 0.25s forwards;
        }

        .checkbox-wrapper-28 label:active::after {
            background-color: #e6e6e6;
        }

            -ms-user-select: none;
            user-select: none;

            height: var(--size);
            width: var(--size);
            margin-right: 8px;
            float: left;
            border: 2px solid #6e6e6e;
            border-radius: 5px;
            transition: 0.15s all ease-out;
        }

        @-webkit-keyframes draw-checkbox-28 {
            0% {

                opacity: 1;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @keyframes draw-checkbox-28 {
            0% {
                stroke-dashoffset: 33;
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @-webkit-keyframes erase-checkbox-28 {
            0% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            99% {
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 33;
                opacity: 0;
            }
        }

        @keyframes erase-checkbox-28 {
            0% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            99% {
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 33;
                opacity: 0;
            }

    </style>
</head>

<body>
    <div class="body-container">
        <div class="container">
            <h1>Mathemoglyphics Translator</h1>
            <span style="margin-top: -15px; margin-bottom: 25px; color: gray;">The official language of Alfred and all other math nerds!</span>
            <div class="translator">
                <textarea id="englishInput" placeholder="Enter English text" oninput="handleEnglishInput()"></textarea>
                <textarea id="mathInput" placeholder="Enter Mathemoglyphics text" oninput="handleMathInput()"></textarea>
            </div>
            <div class="translator">
                <button id="translateToMathBtn" onclick="translateToMath()">Translate to Math</button>
                <button id="translateToEnglishBtn" onclick="translateToEnglish()">Translate to English</button>
            </div>
            <div id="tts" class="translator">
                <button id="englishInputSpeak" onclick="tts('englishInputSpeak', 'englishInput')">Read Aloud English</button>
                <button id="mathInputSpeak" onclick="tts('mathInputSpeak', 'mathInput')">Read Aloud Math</button>
            </div>
            <div class="checkbox-wrapper-28">
                <input id="tmp-28" type="checkbox" class="promoted-input-checkbox" onchange="toggleAutoTranslate()" checked />
                <svg style="z-index: 99; pointer-events: none;">
                    <use xlink:href="#checkmark-28" />
                </svg>
                <label for="tmp-28">
                    Translate Text Automatically
                </label>
                <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                    <symbol id="checkmark-28" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-miterlimit="10" fill="none" d="M22.9 3.7l-15.2 16.6-6.6-7.1"></path>
                    </symbol>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const englishToMath = {
            a: "∠",
            b: "'1010'",
            c: "⌈𝑥⌉",
            d: "𝑑/𝑑𝑥",
            e: "2.718",
            f: "φ",
            g: "Γ(𝑥)",
            h: "'½'",
            i: "∞",
            j: "√(-1)",
            k: "𝑘(𝑥)",
            l: "𝑙𝑖𝑚",
            m: "Δ",
            n: "ℕ",
            o: "π𝑟²",
            p: "π",
            q: "𝑥²",
            r: "ℝ",
            s: "Σ",
            t: "τ",
            u: "∪",
            v: "→",
            w: "𝑊(𝑥)",
            x: "'𝑥'",
            y: "𝑚𝑥 + 𝑏",
            z: "'0'",
            " ": "　　",
        };
        
        const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));
        
        function translateToMath() {
            const englishText = document.getElementById("englishInput").value.toLowerCase();
            const words = englishText.split(" ");
            const mathText = words.map(word => {
                const translatedWord = word.split("").map((char) => englishToMath[char] || char).join(" | ");
                return "{ " + translatedWord + " }";
            }).join("　　");
            if (document.getElementById("englishInput").value.length == 0) {
            	document.getElementById("mathInput").value = "";
            }
            else {
            	document.getElementById("mathInput").value = mathText;
            }
        }
        
        function translateToEnglish() {
            const mathText = document.getElementById("mathInput").value.split("　　");
            const englishText = mathText.map((symbol) => {
                const translatedWord = symbol.slice(2, -2).split(" | ").map((char) => mathToEnglish[char] || char).join("");
                return translatedWord;
            }).join(" ");
            document.getElementById("englishInput").value = englishText;
        }
        
        function handleEnglishInput() {
            if (document.getElementById("tmp-28").checked) {
                translateToMath();
            }
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function handleMathInput() {
            if (document.getElementById("tmp-28").checked) {
                translateToEnglish();
            }
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function checkForInput() {
            if (document.getElementById("englishInput").value.length == 0) {
                document.getElementById("englishInputSpeak").disabled = true;
            } else {
                document.getElementById("englishInputSpeak").disabled = false;
            }
            if (document.getElementById("mathInput").value.length == 0) {
                document.getElementById("mathInputSpeak").disabled = true;
            } else {
                document.getElementById("mathInputSpeak").disabled = false;
            }
        }
        
        function toggleAutoTranslate() {
            const autoTranslateEnabled = document.getElementById("tmp-28").checked;
            document.getElementById("translateToMathBtn").disabled = autoTranslateEnabled;
            document.getElementById("translateToEnglishBtn").disabled = autoTranslateEnabled;
        }
        
        let interval;
        
        function startInterval() {
            interval = setInterval(checkForInput, 50);
        }
        
        function stopInterval() {
            clearInterval(interval);
        }
        
        const replaceLast = (str, pattern, replacement) => {
            const match =
                typeof pattern === 'string'
                	? pattern
                	: (str.match(new RegExp(pattern.source, 'g')) || []).slice(-1)[0];
            if (!match) return str;
            const last = str.lastIndexOf(match);
            return last !== -1
            	? `${str.slice(0, last)}${replacement}${str.slice(last + match.length)}`
            	: str;
        };
        
        function tts(btn, id) {
            button = document.getElementById(btn);
            text = document.getElementById(id).value;
            /* a: "∠",
            b: "'1010'",
            c: "⌈𝑥⌉",
            d: "𝑑/𝑑𝑥",
            e: "2.718",
            f: "φ",
            g: "Γ(𝑥)",
            h: "'½'",
            i: "∞",
            j: "√(-1)",
            k: "𝑘(𝑥)",
            l: "𝑙𝑖𝑚",
            m: "⊿",
            n: "ℕ",
            o: "π𝑟²",
            p: "π",
            q: "𝑥²",
            r: "ℝ",
            s: "Σ",
            t: "τ",
            u: "∪",
            v: "→",
            w: "𝑊(𝑥)",
            x: "'𝑥'",
            y: "𝑚𝑥 + 𝑏",
            z: "'0'",
            " ": "　　", */
            corrected = replaceLast(text.replace(/\{ /g, "").replace(/ \}/g, "").replace(/\|/g, " ").replace(/∠/g, "angle,").replace(/\'1010\'/g, "binary,").replace(/⌈𝑥⌉/g, "ceiling of x,").replace(/𝑑\/𝑑𝑥/g, "derivative of x,").replace(/2.718/g, "oiler's number,").replace(/φ/g, "phi,").replace(/Γ\(𝑥\)/g, "gamma of x,").replace(/'½'/g, "one half,").replace(/∞/g, "infinity,").replace(/√\(-1\)/g, "square root of negative one,").replace(/𝑘\(𝑥\)/g, "k of x,").replace(/𝑙𝑖𝑚/g, "limit,").replace(/⊿/g, "slope,").replace(/ℕ/g, "set of natural numbers,").replace(/π𝑟²/g, "pi r squared,").replace(/π/g, "pi,").replace(/𝑥²/g, "x squared,").replace(/ℝ/g, "set of real numbers,").replace(/Σ/g, "sigma,").replace(/τ/g, "tao,").replace(/∪/g, "union,").replace(/→/g, "vector,").replace(/𝑊\(𝑥\)/g, "lambert w function,").replace(/\'𝑥\'/g, "x,").replace(/𝑚𝑥 \+ 𝑏/g, "m x plus b,").replace(/\'0\'/g, "zero,").replace(/   /g, " "), ",", ".");
            console.warn("\"" + text + "\" is being read as \"" + corrected + "\"");
            responsiveVoice.speak(corrected, "UK English Female", {
                onstart: function () {
                    stopInterval();
                    document.getElementById("englishInputSpeak").disabled = true;
                    document.getElementById("mathInputSpeak").disabled = true;
                    button.innerHTML = button.innerHTML + " 🔊";
                },
                onend: function () {
                    startInterval();
                    document.getElementById("englishInputSpeak").disabled = false;
                    document.getElementById("mathInputSpeak").disabled = false;
                    button.innerHTML = button.innerHTML.replaceAll(" 🔊", "");
                },
            });
        }
        
        document.getElementById("englishInput").value = localStorage.getItem("englishInput");
        document.getElementById("mathInput").value = localStorage.getItem("mathInput");
        
        startInterval();
        toggleAutoTranslate();
        
        console.log(
            '%cMathemoglyphics is a joke language created by 0201._ that replaces all English letters with a mathematical term. Apparently, math wizards like Alfred speak this on a regular basis and like to hide the fact that it exists. Words are separated by "　　" (a wide space) and "letters" are separated by "\\\\" (two backslashes). Enjoy! ... Wait, why in the realm of mathematics are you here? Return to your slumber party, you indentured servant! 😡',
            "background-image: linear-gradient(to top, violet, indigo, blue, green, yellow, orange, red); -webkit-background-clip: text; color: transparent; font-size: 20px;"
        );
    </script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=MkGZCXWM"></script>
</body>

</html>

                </svg>
            </div>
        </div>
    </div>

    <script>
        const englishToMath = {
            a: "∠",
            b: "'1010'",
            c: "⌈𝑥⌉",
            d: "𝑑/𝑑𝑥",
            e: "2.718",
            f: "φ",
            g: "Γ(𝑥)",
            h: "'½'",
            i: "∞",
            j: "√(-1)",
            k: "𝑘(𝑥)",
            l: "𝑙𝑖𝑚",
            m: "⊿",
            n: "ℕ",
            o: "π𝑟²",
            p: "π",
            q: "𝑥²",
            r: "ℝ",
            s: "Σ",
            t: "τ",
            u: "∪",
            v: "→",
            w: "𝑊(𝑥)",
            x: "'𝑥'",
            y: "𝑚𝑥 + 𝑏",
            z: "'0'",
            " ": "　　",
        };
        
        const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));
        
        function translateToMath() {
            const englishText = document.getElementById("englishInput").value.toLowerCase();
            const words = englishText.split(" ");
            const mathText = words.map(word => {
                const translatedWord = word.split("").map((char) => englishToMath[char] || char).join(" | ");
                return "{ " + translatedWord + " }";
            }).join("　　");
            if (document.getElementById("englishInput").value.length == 0) {
            	document.getElementById("mathInput").value = "";
            }
            else {
            	document.getElementById("mathInput").value = mathText;
            }
        }
        
        function translateToEnglish() {
            const mathText = document.getElementById("mathInput").value.split("　　");
            const englishText = mathText.map((symbol) => {
                const translatedWord = symbol.slice(2, -2).split(" | ").map((char) => mathToEnglish[char] || char).join("");
                return translatedWord;
            }).join(" ");
            document.getElementById("englishInput").value = englishText;
        }
        
        function handleEnglishInput() {
            if (document.getElementById("tmp-28").checked) {
                translateToMath();
            }
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function handleMathInput() {
            if (document.getElementById("tmp-28").checked) {
                translateToEnglish();
            }
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function checkForInput() {
            if (document.getElementById("englishInput").value.length == 0) {
                document.getElementById("englishInputSpeak").disabled = true;
            } else {
                document.getElementById("englishInputSpeak").disabled = false;
            }
            if (document.getElementById("mathInput").value.length == 0) {
                document.getElementById("mathInputSpeak").disabled = true;
            } else {
                document.getElementById("mathInputSpeak").disabled = false;
            }
        }
        
        function toggleAutoTranslate() {
            const autoTranslateEnabled = document.getElementById("tmp-28").checked;
            document.getElementById("translateToMathBtn").disabled = autoTranslateEnabled;
            document.getElementById("translateToEnglishBtn").disabled = autoTranslateEnabled;
        }
        
        let interval;
        
        function startInterval() {
            interval = setInterval(checkForInput, 50);
        }
        
        function stopInterval() {
            clearInterval(interval);
        }
        
        const replaceLast = (str, pattern, replacement) => {
            const match =
                typeof pattern === 'string'
                	? pattern
                	: (str.match(new RegExp(pattern.source, 'g')) || []).slice(-1)[0];
            if (!match) return str;
            const last = str.lastIndexOf(match);
            return last !== -1
            	? `${str.slice(0, last)}${replacement}${str.slice(last + match.length)}`
            	: str;
        };
        
        function tts(btn, id) {
            button = document.getElementById(btn);
            text = document.getElementById(id).value;
            /* a: "∠",
            b: "'1010'",
            c: "⌈𝑥⌉",
            d: "𝑑/𝑑𝑥",
            e: "2.718",
            f: "φ",
            g: "Γ(𝑥)",
            h: "'½'",
            i: "∞",
            j: "√(-1)",
            k: "𝑘(𝑥)",
            l: "𝑙𝑖𝑚",
            m: "⊿",
            n: "ℕ",
            o: "π𝑟²",
            p: "π",
            q: "𝑥²",
            r: "ℝ",
            s: "Σ",
            t: "τ",
            u: "∪",
            v: "→",
            w: "𝑊(𝑥)",
            x: "'𝑥'",
            y: "𝑚𝑥 + 𝑏",
            z: "'0'",
            " ": "　　", */
            corrected = replaceLast(text.replace(/\{ /g, "").replace(/ \}/g, "").replace(/\|/g, " ").replace(/∠/g, "angle,").replace(/\'1010\'/g, "binary,").replace(/⌈𝑥⌉/g, "ceiling of x,").replace(/𝑑\/𝑑𝑥/g, "derivative of x,").replace(/2.718/g, "oiler's number,").replace(/φ/g, "phi,").replace(/Γ\(𝑥\)/g, "gamma of x,").replace(/'½'/g, "one half,").replace(/∞/g, "infinity,").replace(/√\(-1\)/g, "square root of negative one,").replace(/𝑘\(𝑥\)/g, "k of x,").replace(/𝑙𝑖𝑚/g, "limit,").replace(/⊿/g, "slope,").replace(/ℕ/g, "set of natural numbers,").replace(/π𝑟²/g, "pi r squared,").replace(/π/g, "pi,").replace(/𝑥²/g, "x squared,").replace(/ℝ/g, "set of real numbers,").replace(/Σ/g, "sigma,").replace(/τ/g, "tao,").replace(/∪/g, "union,").replace(/→/g, "vector,").replace(/𝑊\(𝑥\)/g, "lambert w function,").replace(/\'𝑥\'/g, "x,").replace(/𝑚𝑥 \+ 𝑏/g, "m x plus b,").replace(/\'0\'/g, "zero,").replace(/   /g, " "), ",", ".");
            console.warn("\"" + text + "\" is being read as \"" + corrected + "\"");
            responsiveVoice.speak(corrected, "UK English Female", {
                onstart: function () {
                    stopInterval();
                    document.getElementById("englishInputSpeak").disabled = true;
                    document.getElementById("mathInputSpeak").disabled = true;
                    button.innerHTML = button.innerHTML + " 🔊";
                },
                onend: function () {
                    startInterval();
                    document.getElementById("englishInputSpeak").disabled = false;
                    document.getElementById("mathInputSpeak").disabled = false;
                    button.innerHTML = button.innerHTML.replaceAll(" 🔊", "");
                },
            });
        }
        
        document.getElementById("englishInput").value = localStorage.getItem("englishInput");
        document.getElementById("mathInput").value = localStorage.getItem("mathInput");
        
        startInterval();
        toggleAutoTranslate();
        
        console.log(
            '%cMathemoglyphics is a joke language created by 0201._ that replaces all English letters with a mathematical term. Apparently, math wizards like Alfred speak this on a regular basis and like to hide the fact that it exists. Words are separated by "　　" (a wide space) and "letters" are separated by "\\\\" (two backslashes). Enjoy! ... Wait, why in the realm of mathematics are you here? Return to your slumber party, you indentured servant! 😡',
            "background-image: linear-gradient(to top, violet, indigo, blue, green, yellow, orange, red); -webkit-background-clip: text; color: transparent; font-size: 20px;"
        );
    </script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=MkGZCXWM"></script>
</body>
