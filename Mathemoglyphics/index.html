<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>Mathemoglyphics Translator</title>
        <link rel="shortcut icon" type="image/x-icon" href="logo.png" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
        <style>
            body {
                font-family: "Poppins", sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 50px;
                background-color: #f0f0f0;
                margin: 0;
                zoom: 90%;
            }
            .container {
                display: flex;
                width: 100%;
                max-width: 600px;
                flex-direction: column;
                align-items: center;
                text-align: center;
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .translator {
                display: flex;
                align-items: center;
                width: 100%;
            }
            .translator textarea {
                font-family: "Poppins", sans-serif;
                width: 100%;
                height: 200px;
                margin: 10px;
                padding: 15px;
                padding-right: 40px;
                font-size: 16px;
                border: 1px solid #ccc;
                border-radius: 10px;
                resize: none;
                outline: none;
            }
            .translator button {
                font-family: "Poppins", sans-serif;
                width: calc(50% - 20px);
                margin: 10px;
                padding: 15px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                background-color: #4497cf;
                color: white;
                cursor: pointer;
                transition: all 0.25s ease;
                outline: none;
            }
            .translator button:disabled {
                background-color: #ccc;
                cursor: not-allowed;
            }
            .translator button:hover:enabled {
                background-color: #055f9c;
            }
            #tts button {
                font-family: "Poppins", sans-serif;
                width: calc(50% - 20px);
                margin: 10px;
                padding: 15px;
                font-size: 16px;
                border: none;
                border-radius: 10px;
                color: white;
                cursor: pointer;
                transition: all 0.25s ease;
                outline: none;
                background-color: #4bbf28;
            }
            #tts button:disabled {
                cursor: not-allowed;
            }
            #tts button:hover:enabled {
                background-color: #1e8000;
            }
            .checkbox-wrapper-28 {
                margin-top: 10px;
                --size: 25px;
                position: relative;
            }
            .checkbox-wrapper-28 *,
            .checkbox-wrapper-28 *:before,
            .checkbox-wrapper-28 *:after {
                box-sizing: border-box;
            }
            .checkbox-wrapper-28 .promoted-input-checkbox {
                border: 0;
                clip: rect(0 0 0 0);
                height: 1px;
                margin: -1px;
                overflow: hidden;
                padding: 0;
                position: absolute;
                width: 1px;
            }
            .checkbox-wrapper-28 input:checked ~ svg {
                height: calc(var(--size) * 0.6);
                -webkit-animation: draw-checkbox-28 ease-in-out 0.2s forwards;
                animation: draw-checkbox-28 ease-in-out 0.2s forwards;
            }
            .checkbox-wrapper-28 label:active::after {
                background-color: #e6e6e6;
            }
            .checkbox-wrapper-28 label {
                color: #6e6e6e;
                line-height: var(--size);
                cursor: pointer;
                position: relative;
                -webkit-user-select: none; /* Safari */
                -ms-user-select: none; /* IE 10 and IE 11 */
                user-select: none; /* Standard syntax */
            }
            .checkbox-wrapper-28 label:after {
                content: "";
                height: var(--size);
                width: var(--size);
                margin-right: 8px;
                float: left;
                border: 2px solid #6e6e6e;
                border-radius: 5px;
                transition: 0.15s all ease-out;
            }
            .checkbox-wrapper-28 svg {
                stroke: #6e6e6e;
                stroke-width: 3px;
                height: 0;
                width: calc(var(--size) * 0.6);
                position: absolute;
                left: calc(var(--size) * 0.21);
                top: calc(var(--size) * 0.2);
                stroke-dasharray: 33;
            }
            @-webkit-keyframes draw-checkbox-28 {
                0% {
                    stroke-dashoffset: 33;
                }
                100% {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes draw-checkbox-28 {
                0% {
                    stroke-dashoffset: 33;
                }
                100% {
                    stroke-dashoffset: 0;
                }
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>Mathemoglyphics Translator</h1>
            <span style="margin-top: -15px; margin-bottom: 25px; color: gray;">The official language of Alfred and all other math nerds!</span>
            <div class="translator">
                <textarea id="englishInput" placeholder="Enter English text" oninput="handleEnglishInput()"></textarea>
                <textarea id="mathInput" placeholder="Enter Mathemoglyphics text" oninput="handleMathInput()"></textarea>
            </div>
            <div class="translator">
                <button id="translateToMathBtn" onclick="translateToMath()">Translate to Math</button>
                <button id="translateToEnglishBtn" onclick="translateToEnglish()">Translate to English</button>
            </div>
            <div id="tts" class="translator">
                <button id="englishInputSpeak" onclick="tts('englishInputSpeak', 'englishInput')">Speak English</button>
                <button id="mathInputSpeak" onclick="tts('mathInputSpeak', 'mathInput')">Speak Math</button>
            </div>
            <div class="checkbox-wrapper-28">
                <input id="tmp-28" type="checkbox" class="promoted-input-checkbox" onchange="toggleAutoTranslate()" checked />
                <svg><use xlink:href="#checkmark-28" /></svg>
                <label for="tmp-28">
                    Translate Text Automatically
                </label>
                <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                    <symbol id="checkmark-28" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-miterlimit="10" fill="none" d="M22.9 3.7l-15.2 16.6-6.6-7.1"></path>
                    </symbol>
                </svg>
            </div>
        </div>

        <script>
            const englishToMath = {
                a: "∠",
                b: "'1010'",
                c: "⌈𝑥⌉",
                d: "𝑑/𝑑𝑥",
                e: "2.718",
                f: "φ",
                g: "Γ(𝑥)",
                h: "'½'",
                i: "∞",
                j: "√(-1)",
                k: "𝑘(𝑥)",
                l: "𝑙𝑖𝑚",
                m: "⊿",
                n: "ℕ",
                o: "π𝑟²",
                p: "π",
                q: "𝑥²",
                r: "ℝ",
                s: "Σ",
                t: "τ",
                u: "∪",
                v: "→",
                w: "𝑊(𝑥)",
                x: "𝑥",
                y: "𝑚𝑥 + 𝑏",
                z: "'0'",
                " ": "　　",
            };

            const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));

            function translateToMath() {
                const englishText = document.getElementById("englishInput").value.toLowerCase();
                const mathText = englishText
                    .split("")
                    .map((char) => englishToMath[char] || char)
                    .join("\\\\");
                document.getElementById("mathInput").value = mathText;
            }

            function translateToEnglish() {
                const mathText = document.getElementById("mathInput").value.split("\\\\");
                const englishText = mathText.map((symbol) => mathToEnglish[symbol] || symbol).join("");
                document.getElementById("englishInput").value = englishText;
            }

            function handleEnglishInput() {
                if (document.getElementById("tmp-28").checked) {
                    translateToMath();
                }
            }

            function handleMathInput() {
                if (document.getElementById("tmp-28").checked) {
                    translateToEnglish();
                }
            }

            function checkForInput() {
                if (document.getElementById("englishInput").value.length == 0) {
                    document.getElementById("englishInputSpeak").disabled = true;
                } else {
                    document.getElementById("englishInputSpeak").disabled = false;
                }
                if (document.getElementById("mathInput").value.length == 0) {
                    document.getElementById("mathInputSpeak").disabled = true;
                } else {
                    document.getElementById("mathInputSpeak").disabled = false;
                }
            }

            function toggleAutoTranslate() {
                const autoTranslateEnabled = document.getElementById("tmp-28").checked;
                document.getElementById("translateToMathBtn").disabled = autoTranslateEnabled;
                document.getElementById("translateToEnglishBtn").disabled = autoTranslateEnabled;
            }

            toggleAutoTranslate();
            let interval;
            
            function startInterval() {
                interval = setInterval(checkForInput, 50);
            }

            function stopInterval() {
                clearInterval(interval);
            }

            function tts(btn, id) {
                button = document.getElementById(btn);
                text = document.getElementById(id).value;
                /* a: "∠",
                b: "'1010'",
                c: "⌈𝑥⌉",
                d: "𝑑/𝑑𝑥",
                e: "2.718",
                f: "φ",
                g: "Γ(𝑥)",
                h: "'½'",
                i: "∞",
                j: "√(-1)",
                k: "𝑘(𝑥)",
                l: "𝑙𝑖𝑚",
                m: "⊿",
                n: "ℕ",
                o: "π𝑟²",
                p: "π",
                q: "𝑥²",
                r: "ℝ",
                s: "Σ",
                t: "τ",
                u: "∪",
                v: "→",
                w: "𝑊(𝑥)",
                x: "'𝑥'",
                y: "𝑚𝑥 + 𝑏",
                z: "'0'",
                " ": "　　", */
                corrected = text.replace(/\\/g, " ").replace(/∠/g, "angle,").replace(/\'1010\'/g, "binary,").replace(/⌈𝑥⌉/g, "ceiling of x,").replace(/𝑑\/𝑑𝑥/g, "derivative of x,").replace(/2.718/g, "two point seven one eight,").replace(/φ/g, "phi,").replace(/Γ\(𝑥\)/g, "gamma of x,").replace(/'½'/g, "one half,").replace(/∞/g, "infinity,").replace(/√\(-1\)/g, "square root of negative one,").replace(/𝑘\(𝑥\)/g, "k of x,").replace(/𝑙𝑖𝑚/g, "limit,").replace(/⊿/g, "slope,").replace(/ℕ/g, "set of natural numbers,").replace(/π𝑟²/g, "pi r squared,").replace(/π/g, "pi,").replace(/𝑥²/g, "x squared,").replace(/ℝ/g, "set of real numbers,").replace(/Σ/g, "sigma,").replace(/τ/g, "tau,").replace(/∪/g, "union,").replace(/→/g, "vector,").replace(/𝑊\(𝑥\)/g, "lambert w function,").replace(/\'𝑥\'/g, "x,").replace(/𝑚𝑥 \+ 𝑏/g, "m x plus b,").replace(/\'0\'/g, "zero,");
                console.warn("\"" + text + "\" is being read as \"" + corrected + "\"");
                responsiveVoice.speak(corrected, "UK English Female", {
                    onstart: function () {
                        stopInterval();
                        document.getElementById("englishInputSpeak").disabled = true;
                        document.getElementById("mathInputSpeak").disabled = true;
                        button.innerHTML = button.innerHTML + " 🕬";
                    },
                    onend: function () {
                        startInterval();
                        document.getElementById("englishInputSpeak").disabled = false;
                        document.getElementById("mathInputSpeak").disabled = false;
                        button.innerHTML = button.innerHTML.replaceAll(" 🕬", "");
                    },
                });
            }

            console.log(
                '%cMathemoglyphics is a joke language created by 0201._ that replaces all English letters with a mathematical term. Apparently, math wizards like Alfred speak this on a regular basis and like to hide the fact that it exists. Words are separated by "　　" (a wide space) and "letters" are separated by "\\\\" (two backslashes). Enjoy! ... Wait, why in the realm of mathematics are you here? Return to your slumber party, you indentured servant! 😡',
                "background-image: linear-gradient(to top, violet, indigo, blue, green, yellow, orange, red); -webkit-background-clip: text; color: transparent; font-size: 20px;"
            );
        </script>
        <script src="https://code.responsivevoice.org/responsivevoice.js?key=MkGZCXWM"></script>
    </body>
</html>
