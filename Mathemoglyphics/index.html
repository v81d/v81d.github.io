<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mathemoglyphics Translator</title>
    <link rel="shortcut icon" type="image/x-icon" href="logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            background-color: #f0f0f0;
            margin: 0;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .translator {
            display: flex;
            align-items: center;
            width: 100%;
        }
        .translator textarea {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            height: 200px;
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            resize: none;
            outline: none;
        }
        .translator button {
            font-family: 'Poppins', sans-serif;
            width: calc(50% - 20px);
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .translator button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .translator button:hover:enabled {
            background-color: #0056b3;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin: 10px;
        }
        .checkbox-container input {
            display: none;
        }
        .checkbox-container label {
            position: relative;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
        }
        .checkbox-container label::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            background-color: white;
            transition: border-color 0.25s ease, background-color 0.25s ease;
        }
        .checkbox-container input:checked + label::before {
            border-color: #007bff;
            background-color: #007bff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Mathemoglyphics Translator</h1>
        <div class="translator">
            <textarea id="englishInput" placeholder="Enter English text" oninput="handleEnglishInput()"></textarea>
            <textarea id="mathInput" placeholder="Enter Mathemoglyphics text" oninput="handleMathInput()"></textarea>
        </div>
        <div class="translator">
            <button id="translateToMathBtn" onclick="translateToMath()">Translate to Math</button>
            <button id="translateToEnglishBtn" onclick="translateToEnglish()">Translate to English</button>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="autoTranslateCheckbox" onchange="toggleAutoTranslate()" checked>
            <label for="autoTranslateCheckbox">Translate Text Automatically</label>
        </div>
    </div>

    <script>
        const englishToMath = {
            'a': 'α', 'b': 'β', 'c': 'ℂ', 'd': 'd/d𝑥', 'e': '2.718', 'f': 'φ', 'g': 'Γ(𝑥)', 'h': '𝘩(𝑥)', 'i': '∞', 'j': '√(-1)', 
            'k': '𝑘', 'l': '𝑙𝑖𝑚', 'm': '⊿', 'n': 'ℕ', 'o': 'π𝑟²', 'p': 'π', 'q': 'ℚ', 'r': 'ℝ', 's': 'Σ', 't': 'τ', 
            'u': '∪', 'v': '→', 'w': '𝑊(𝑥)', 'x': '𝑥', 'y': '𝑦', 'z': '𝑧', ' ': '　　'
        };

        const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));

        function translateToMath() {
            const englishText = document.getElementById('englishInput').value.toLowerCase();
            const mathText = englishText.split('').map(char => englishToMath[char] || char).join('\\');
            document.getElementById('mathInput').value = mathText;
        }

        function translateToEnglish() {
            const mathText = document.getElementById('mathInput').value.split('\\');
            const englishText = mathText.map(symbol => mathToEnglish[symbol] || symbol).join('');
            document.getElementById('englishInput').value = englishText;
        }

        function handleEnglishInput() {
            if (document.getElementById('autoTranslateCheckbox').checked) {
                translateToMath();
            }
        }

        function handleMathInput() {
            if (document.getElementById('autoTranslateCheckbox').checked) {
                translateToEnglish();
            }
        }

        function toggleAutoTranslate() {
            const autoTranslateEnabled = document.getElementById('autoTranslateCheckbox').checked;
            document.getElementById('translateToMathBtn').disabled = autoTranslateEnabled;
            document.getElementById('translateToEnglishBtn').disabled = autoTranslateEnabled;
        }
        
        toggleAutoTranslate();
    </script>
</body>

</html>
