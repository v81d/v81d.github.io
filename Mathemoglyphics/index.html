<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mathemoglyphics Translator</title>
    <link rel="shortcut icon" type="image/x-icon" href="logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            background-color: #f0f0f0;
            margin: 0;
        }
        .container {
            display: flex;
            width: 100%;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .translator {
            display: flex;
            align-items: center;
            width: 100%;
        }
        .translator textarea {
            font-family: 'Poppins', sans-serif;
            width: 100%;
            height: 200px;
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            resize: none;
            outline: none;
        }
        .translator button {
            font-family: 'Poppins', sans-serif;
            width: calc(50% - 20px);
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .translator button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .translator button:hover:enabled {
            background-color: #0056b3;
        }
        .checkbox-wrapper-28 {
        margin-top: 10px;
    --size: 25px;
    position: relative;
  }

  .checkbox-wrapper-28 *,
  .checkbox-wrapper-28 *:before,
  .checkbox-wrapper-28 *:after {
    box-sizing: border-box;
  }

  .checkbox-wrapper-28 .promoted-input-checkbox {
    border: 0;
    clip: rect(0 0 0 0);
    height: 1px;
    margin: -1px;
    overflow: hidden;
    padding: 0;
    position: absolute;
    width: 1px;
  }

  .checkbox-wrapper-28 input:checked ~ svg {
    height: calc(var(--size) * 0.6);
    -webkit-animation: draw-checkbox-28 ease-in-out 0.2s forwards;
            animation: draw-checkbox-28 ease-in-out 0.2s forwards;
  }
  .checkbox-wrapper-28 label:active::after {
    background-color: #e6e6e6;
  }
  .checkbox-wrapper-28 label {
    color: black;
    line-height: var(--size);
    cursor: pointer;
    position: relative;
  }
  .checkbox-wrapper-28 label:after {
    content: "";
    height: var(--size);
    width: var(--size);
    margin-right: 8px;
    float: left;
    border: 2px solid #6e6e6e;
    border-radius: 5px;
    transition: 0.15s all ease-out;
  }
  .checkbox-wrapper-28 svg {
    stroke: #6e6e6e;
    stroke-width: 3px;
    height: 0;
    width: calc(var(--size) * 0.6);
    position: absolute;
    left: calc(var(--size) * 0.21);
    top: calc(var(--size) * 0.2);
    stroke-dasharray: 33;
  }

  @-webkit-keyframes draw-checkbox-28 {
    0% {
      stroke-dashoffset: 33;
    }
    100% {
      stroke-dashoffset: 0;
    }
  }

  @keyframes draw-checkbox-28 {
    0% {
      stroke-dashoffset: 33;
    }
    100% {
      stroke-dashoffset: 0;
    }
  }
    </style>
</head>

<body>
    <div class="container">
        <h1>Mathemoglyphics Translator</h1>
        <div class="translator">
            <textarea id="englishInput" placeholder="Enter English text" oninput="handleEnglishInput()"></textarea>
            <textarea id="mathInput" placeholder="Enter Mathemoglyphics text" oninput="handleMathInput()"></textarea>
        </div>
        <div class="translator">
            <button id="translateToMathBtn" onclick="translateToMath()">Translate to Math</button>
            <button id="translateToEnglishBtn" onclick="translateToEnglish()">Translate to English</button>
        </div>
        <div class="checkbox-wrapper-28">
            <input id="tmp-28" type="checkbox" class="promoted-input-checkbox" />
            <svg>
                <use xlink:href="#checkmark-28" />
            </svg>
            <label for="tmp-28">
                Translate Text Automatically
            </label>
            <svg xmlns="http://www.w3.org/2000/svg" style="display: none">
                <symbol id="checkmark-28" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-miterlimit="10" fill="none" d="M22.9 3.7l-15.2 16.6-6.6-7.1">
                    </path>
                </symbol>
            </svg>
        </div>
    </div>

    <script>
        const englishToMath = {
            'a': 'α', 'b': 'β', 'c': 'ℂ', 'd': '𝑑/𝑑𝑥', 'e': '2.718', 'f': 'φ', 'g': 'Γ(𝑥)', 'h': '𝘩(𝑥)', 'i': '∞', 'j': '√(-1)', 
            'k': '𝑘', 'l': '𝑙𝑖𝑚', 'm': '⊿', 'n': 'ℕ', 'o': 'π𝑟²', 'p': 'π', 'q': 'ℚ', 'r': 'ℝ', 's': 'Σ', 't': 'τ', 
            'u': '∪', 'v': '→', 'w': '𝑊(𝑥)', 'x': '𝑥', 'y': '𝑦', 'z': '𝑧', ' ': '　　'
        };

        const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));

        function translateToMath() {
            const englishText = document.getElementById('englishInput').value.toLowerCase();
            const mathText = englishText.split('').map(char => englishToMath[char] || char).join('\\');
            document.getElementById('mathInput').value = mathText;
        }

        function translateToEnglish() {
            const mathText = document.getElementById('mathInput').value.split('\\');
            const englishText = mathText.map(symbol => mathToEnglish[symbol] || symbol).join('');
            document.getElementById('englishInput').value = englishText;
        }

        function handleEnglishInput() {
            if (document.getElementById('autoTranslateCheckbox').checked) {
                translateToMath();
            }
        }

        function handleMathInput() {
            if (document.getElementById('autoTranslateCheckbox').checked) {
                translateToEnglish();
            }
        }

        function toggleAutoTranslate() {
            const autoTranslateEnabled = document.getElementById('autoTranslateCheckbox').checked;
            document.getElementById('translateToMathBtn').disabled = autoTranslateEnabled;
            document.getElementById('translateToEnglishBtn').disabled = autoTranslateEnabled;
        }
        
        toggleAutoTranslate();
    </script>
</body>

</html>
