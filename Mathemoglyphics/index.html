<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Mathemoglyphics Translator</title>
    <link rel="shortcut icon" type="image/x-icon" href="logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Manrope", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
            z-index: -99;
            background-image: url("bg.jpg");
            -webkit-backdrop-filter: blur(4px);
            /* Use for Safari 9+, Edge 17+ (not a mistake) and iOS Safari 9.2+ */
            backdrop-filter: blur(4px);
            /* Supported on all major browsers */
            background-size: fill;
            margin: 0;
            zoom: 90%;
        }

        .body-container {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        }

        .translator {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .translator .col {
            display: flex;
            justify-content: right;
            margin: 10px;
            width: 100%;
            height: 250px;
            border: 1px solid #ccc;
            border-radius: 10px;
            transition: all 0.8s ease;
        }

        .translator .parent {
            position: absolute;
            margin: 15px;
            width: 30px;
            height: 30px;
            border-radius: 10px;
        }

        .speak g {
            transition: all 0.5s ease;
        }

        .translator .speak-hover:hover>g {
            fill: #999999;
        }

        .translator textarea {
            font-family: "Manrope", sans-serif;
            width: 100%;
            padding: 15px;
            padding-right: 60px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            resize: none;
            outline: none;
        }

        .translator textarea::-webkit-scrollbar {
            display: none;
        }

        .translator .col:hover {
            box-shadow: 0 10px 10px -10px #ccc;
        }

        .translator .col:focus {
            box-shadow: 0 10px 10px -10px #ccc;
        }

        .translator button {
            font-family: "Manrope", sans-serif;
            width: calc(50% - 20px);
            margin: 10px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background-color: #8f36f5;
            background-position: center;
            color: white;
            cursor: pointer;
            transition: all 0.8s ease;
            outline: none;
        }

        .translator button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .translator button:hover:enabled {
            background: #a561f2 radial-gradient(circle, transparent 1%, #a561f2 1%) center/15000%;
            box-shadow: 0 10px 10px -10px #a561f2;
        }

        .translator button:active:enabled {
            background-color: #c69df5;
            background-size: 100%;
            transition: background 0s;
        }

        .checkbox-wrapper-28 {
            margin-top: 10px;
            --size: 25px;
            position: relative;
        }

        .checkbox-wrapper-28 *,
        .checkbox-wrapper-28 *:before,
        .checkbox-wrapper-28 *:after {
            box-sizing: border-box;
        }

        .checkbox-wrapper-28 .promoted-input-checkbox {
            border: 0;
            clip: rect(0 0 0 0);
            height: 1px;
            margin: -1px;
            overflow: hidden;
            padding: 0;
            position: absolute;
            width: 1px;
        }

        .checkbox-wrapper-28 svg {
            stroke: #6e6e6e;
            stroke-width: 3px;
            height: calc(var(--size) * 0.6);
            width: calc(var(--size) * 0.6);
            position: absolute;
            left: calc(var(--size) * 0.21);
            top: calc(var(--size) * 0.2);
            stroke-dasharray: 33;
            opacity: 0;
        }

        .checkbox-wrapper-28 input:checked~svg {
            -webkit-animation: draw-checkbox-28 ease-in-out 0.25s forwards;
            animation: draw-checkbox-28 ease-in-out 0.25s forwards;
        }

        .checkbox-wrapper-28 input:not(:checked)~svg {
            -webkit-animation: erase-checkbox-28 ease-in-out 0.25s forwards;
            animation: erase-checkbox-28 ease-in-out 0.25s forwards;
        }

        .checkbox-wrapper-28 label::after {
            transition: all 0.8s ease;
        }

        .checkbox-wrapper-28 label:active::after {
            background-color: #e6e6e6;
        }

        .checkbox-wrapper-28 label:hover::after {
            box-shadow: 0 10px 10px -10px #6e6e6e;
        }

        .checkbox-wrapper-28 label {
            color: #6e6e6e;
            line-height: var(--size);
            cursor: pointer;
            position: relative;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .checkbox-wrapper-28 label:after {
            content: "";
            height: var(--size);
            width: var(--size);
            margin-right: 8px;
            float: left;
            border: 2px solid #6e6e6e;
            border-radius: 5px;
            transition: 0.15s all ease-out;
        }

        @-webkit-keyframes draw-checkbox-28 {
            0% {
                stroke-dashoffset: 33;
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @keyframes draw-checkbox-28 {
            0% {
                stroke-dashoffset: 33;
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        @-webkit-keyframes erase-checkbox-28 {
            0% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            99% {
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 33;
                opacity: 0;
            }
        }

        @keyframes erase-checkbox-28 {
            0% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            99% {
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 33;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div class="body-container">
        <div class="container">
            <h1>Mathemoglyphics Translator</h1>
            <span style="margin-top: -15px; margin-bottom: 25px; color: gray;">The official language of Alfred and all other math nerds!</span>
            <div class="translator">
                <div class="col">
                    <textarea id="englishInput" placeholder="Enter English text" oninput="handleEnglishInput()"></textarea>
                    <div class="parent" id="en-p">
                        <svg onclick="tts('en-g', 'englishInput')" id="englishInputSpeak" class="speak" version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 750" preserveAspectRatio="xMidYMid meet">
                            <g id="en-g" transform="translate(0, 750) scale(0.1,-0.1)" fill="#ccc" stroke="none">
                                <path d="M3852 6357 c-40 -12 -51 -22 -967 -816 l-750 -650 -781 -1 c-881 0 -849 3 -927 -73 -82 -80 -77 -12 -77 -1132 0 -1115 -4 -1051 75 -1130 77 -78 41 -75 910 -75 l772 0 844 -730 c464 -402 862 -739 885 -750 48 -24 148 -27 198 -6 46 19 104 72 129 120 l22 41 3 2495 c2 2747 7 2554 -59 2634 -61 73 -179 105 -277 73z" />
                                <path d="M6071 6333 c-59 -21 -124 -87 -144 -148 -36 -104 -17 -168 87 -304 413 -540 658 -1157 731 -1838 21 -195 21 -550 0 -746 -72 -677 -321 -1302 -731 -1838 -41 -53 -81 -115 -89 -139 -68 -192 122 -383 314 -315 67 23 93 47 184 167 444 591 708 1235 809 1978 20 145 23 207 23 520 0 313 -3 375 -23 520 -101 743 -362 1381 -809 1977 -46 61 -96 121 -112 133 -70 49 -159 62 -240 33z" />
                                <path d="M5421 5683 c-89 -31 -161 -136 -161 -234 0 -58 22 -107 102 -225 321 -471 479 -984 479 -1554 0 -570 -159 -1088 -478 -1553 -41 -59 -81 -126 -89 -149 -67 -191 125 -381 317 -313 68 24 99 55 186 181 300 440 488 948 548 1484 20 176 20 524 0 700 -50 440 -183 857 -397 1240 -89 159 -223 355 -263 386 -69 52 -161 66 -244 37z" />
                                <path d="M4711 4973 c-97 -34 -169 -149 -159 -253 5 -51 13 -67 102 -225 286 -506 286 -1144 0 -1650 -31 -55 -66 -117 -77 -139 -47 -89 -27 -206 48 -281 97 -98 253 -98 349 -1 51 51 154 234 218 384 241 569 234 1201 -19 1767 -64 144 -156 301 -204 346 -66 64 -167 84 -258 52z" />
                            </g>
                        </svg>
                    </div>
                </div>
                <div class="col">
                    <textarea id="mathInput" placeholder="Enter Mathemoglyphics text" oninput="handleMathInput()"></textarea>
                    <div class="parent" id="mg-p">
                        <svg onclick="tts('mg-g', 'mathInput')" id="mathInputSpeak" class="speak" version="1.0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 750" preserveAspectRatio="xMidYMid meet">
                            <g id="mg-g" transform="translate(0, 750) scale(0.1,-0.1)" fill="#ccc" stroke="none">
                                <path d="M3852 6357 c-40 -12 -51 -22 -967 -816 l-750 -650 -781 -1 c-881 0 -849 3 -927 -73 -82 -80 -77 -12 -77 -1132 0 -1115 -4 -1051 75 -1130 77 -78 41 -75 910 -75 l772 0 844 -730 c464 -402 862 -739 885 -750 48 -24 148 -27 198 -6 46 19 104 72 129 120 l22 41 3 2495 c2 2747 7 2554 -59 2634 -61 73 -179 105 -277 73z" />
                                <path d="M6071 6333 c-59 -21 -124 -87 -144 -148 -36 -104 -17 -168 87 -304 413 -540 658 -1157 731 -1838 21 -195 21 -550 0 -746 -72 -677 -321 -1302 -731 -1838 -41 -53 -81 -115 -89 -139 -68 -192 122 -383 314 -315 67 23 93 47 184 167 444 591 708 1235 809 1978 20 145 23 207 23 520 0 313 -3 375 -23 520 -101 743 -362 1381 -809 1977 -46 61 -96 121 -112 133 -70 49 -159 62 -240 33z" />
                                <path d="M5421 5683 c-89 -31 -161 -136 -161 -234 0 -58 22 -107 102 -225 321 -471 479 -984 479 -1554 0 -570 -159 -1088 -478 -1553 -41 -59 -81 -126 -89 -149 -67 -191 125 -381 317 -313 68 24 99 55 186 181 300 440 488 948 548 1484 20 176 20 524 0 700 -50 440 -183 857 -397 1240 -89 159 -223 355 -263 386 -69 52 -161 66 -244 37z" />
                                <path d="M4711 4973 c-97 -34 -169 -149 -159 -253 5 -51 13 -67 102 -225 286 -506 286 -1144 0 -1650 -31 -55 -66 -117 -77 -139 -47 -89 -27 -206 48 -281 97 -98 253 -98 349 -1 51 51 154 234 218 384 241 569 234 1201 -19 1767 -64 144 -156 301 -204 346 -66 64 -167 84 -258 52z" />
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="translator">
                <button id="translateToMathBtn" onclick="translateToMath()">Translate to Math</button>
                <button id="translateToEnglishBtn" onclick="translateToEnglish()">Translate to English</button>
            </div>
            <div id="autotranslate" class="checkbox-wrapper-28">
                <input id="tmp-28" type="checkbox" class="promoted-input-checkbox" onchange="toggleAutoTranslate()" />
                <svg style="z-index: 99; pointer-events: none;">
                    <use xlink:href="#checkmark-28" />
                </svg>
                <label for="tmp-28">
                    Translate Text Automatically
                </label>
                <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
                    <symbol id="checkmark-28" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-miterlimit="10" fill="none" d="M22.9 3.7l-15.2 16.6-6.6-7.1"></path>
                    </symbol>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const englishToMath = {
            a: "∠",
            b: "'1010'",
            c: "⌈𝑥⌉",
            d: "𝑑/𝑑𝑥",
            e: "2.718…",
            f: "φ",
            g: "Γ(𝑥)",
            h: "'½'",
            i: "√(-1)",
            j: "⊷",
            k: "𝑘(𝑥)",
            l: "𝑙𝑖𝑚",
            m: "Δ",
            n: "ℕ",
            o: "π𝑟²",
            p: "π",
            q: "𝑎𝑥² + 𝑏𝑥 + 𝑐",
            r: "→",
            s: "Σ",
            t: "τ",
            u: "∪",
            v: "┋",
            w: "𝑊(𝑥)",
            x: "'𝑥'",
            y: "𝑚𝑥 + 𝑏",
            z: "'0'",
            " ": "　　"
        };
        
        const mathToEnglish = Object.fromEntries(Object.entries(englishToMath).map(([k, v]) => [v, k]));
        
        function translateToMath() {
            const englishText = document.getElementById("englishInput").value;
            const words = englishText.split(" ");
            const mathText = words.map(word => {
                const translatedWord = word.split("").map((char) => {
                    if (char === char.toUpperCase() && /[a-zA-Z]/.test(char)) {
                        return "(" + englishToMath[char.toLowerCase()] + ")*";
                    } else {
                        return englishToMath[char] || char;
                    }
                }).join(" | ");
                return "{ " + translatedWord + " }";
            }).join("　　");
            if (document.getElementById("englishInput").value.length == 0) {
                document.getElementById("mathInput").value = "";
            } else {
                document.getElementById("mathInput").value = mathText;
            }
        }
        
        function translateToEnglish() {
            const mathText = document.getElementById("mathInput").value.split("　　");
            const englishText = mathText.map((symbol) => {
                const translatedWord = symbol.slice(2, -2).split(" | ").map((char) => {
                    if (char.endsWith(")*") && /[a-zA-Z]/.test(mathToEnglish[char.slice(1, -2)])) {
                        return mathToEnglish[char.slice(1, -2)].toUpperCase() || char;
                    } else {
                        return mathToEnglish[char] || char;
                    }
                }).join("");
                return translatedWord;
            }).join(" ");
            document.getElementById("englishInput").value = englishText;
        }
        
        function handleEnglishInput() {
        	checkForInput();
            if (document.getElementById("tmp-28").checked) {
                translateToMath();
            }
            responsiveVoice.cancel();
            document.querySelector("#en-g").style.fill = "#ccc";
            document.querySelector("#mg-g").style.fill = "#ccc";
            document.querySelector("#englishInputSpeak").style.pointerEvents = "auto";
            document.querySelector("#mathInputSpeak").style.pointerEvents = "auto";
            document.querySelector("#en-p").style.cursor = "pointer";
            document.querySelector("#mg-p").style.cursor = "pointer";
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function handleMathInput() {
        	checkForInput();
            if (document.getElementById("tmp-28").checked) {
                translateToEnglish();
            }
            responsiveVoice.cancel();
            document.querySelector("#en-g").style.fill = "#ccc";
            document.querySelector("#mg-g").style.fill = "#ccc";
            document.querySelector("#englishInputSpeak").style.pointerEvents = "auto";
            document.querySelector("#mathInputSpeak").style.pointerEvents = "auto";
            document.querySelector("#en-p").style.cursor = "pointer";
            document.querySelector("#mg-p").style.cursor = "pointer";
            localStorage.setItem("englishInput", document.getElementById("englishInput").value);
            localStorage.setItem("mathInput", document.getElementById("mathInput").value);
        }
        
        function checkForInput() {
            if (document.getElementById("englishInput").value.length == 0) {
                document.querySelector("#en-p").style.cursor = "not-allowed";
                document.getElementById("englishInputSpeak").classList.remove("speak-hover");
                document.getElementById("englishInputSpeak").style.pointerEvents = "none";
            } else {
                if (!responsiveVoice.isPlaying()) {
                	document.querySelector(".parent").style.cursor = "pointer";
                	document.getElementById("englishInputSpeak").classList.add("speak-hover");
                	document.getElementById("englishInputSpeak").style.pointerEvents = "auto";
                }
            }
            if (document.getElementById("mathInput").value.length == 0) {
                document.querySelector("#mg-p").style.cursor = "not-allowed";
                document.getElementById("mathInputSpeak").classList.remove("speak-hover");
                document.getElementById("mathInputSpeak").style.pointerEvents = "none";
            } else {
                if (!responsiveVoice.isPlaying()) {
                	document.querySelector(".parent").style.cursor = "pointer";
                	document.getElementById("mathInputSpeak").classList.add("speak-hover");
                	document.getElementById("mathInputSpeak").style.pointerEvents = "auto";
                }
                
            }
        }
        
        function toggleAutoTranslate() {
            const autoTranslateEnabled = document.getElementById("tmp-28").checked;
            document.getElementById("translateToMathBtn").disabled = autoTranslateEnabled;
            document.getElementById("translateToEnglishBtn").disabled = autoTranslateEnabled;
        }
        
        let interval;
        
        function startInterval() {
            interval = setInterval(checkForInput, 150);
        }
        
        function stopInterval() {
            clearInterval(interval);
        }
        
        const replaceLast = (str, pattern, replacement) => {
            const match =
                typeof pattern === 'string'
                	? pattern
                	: (str.match(new RegExp(pattern.source, 'g')) || []).slice(-1)[0];
            if (!match) return str;
            const last = str.lastIndexOf(match);
            return last !== -1
            	? `${str.slice(0, last)}${replacement}${str.slice(last + match.length)}`
            	: str;
        };
        
        function tts(btn, id) {
            text = document.getElementById(id).value;
            corrected = replaceLast(text.replace(/\{ /g, "").replace(/ \}/g, "").replace(/\|/g, " ").replace(/∠/g, "angle,").replace(/\'1010\'/g, "binary,").replace(/⌈𝑥⌉/g, "ceiling of X,").replace(/𝑑\/𝑑𝑥/g, "derivative of X,").replace(/2.718…/g, "Euler's number,").replace(/φ/g, "phi,").replace(/Γ\(𝑥\)/g, "gamma of X,").replace(/'½'/g, "one half,").replace(/√\(-1\)/g, "square root of negative one,").replace(/⊷/g, "jump discontinuity,").replace(/𝑘\(𝑥\)/g, "K of X,").replace(/𝑙𝑖𝑚/g, "limit,").replace(/Δ/g, "slope,").replace(/ℕ/g, "set of natural numbers,").replace(/π𝑟²/g, "pi R squared,").replace(/π/g, "pi,").replace(/𝑎𝑥² \+ 𝑏𝑥 \+ 𝑐/g, "quadratic,").replace(/→/g, "ray,").replace(/Σ/g, "sigma,").replace(/τ/g, "tau,").replace(/∪/g, "union,").replace(/┋/g, "vertical line,").replace(/𝑊\(𝑥\)/g, "Lambert W function,").replace(/\'𝑥\'/g, "x,").replace(/𝑚𝑥 \+ 𝑏/g, "M X plus B,").replace(/\'0\'/g, "zero,").replace(/   /g, " ").replace(/　　/g, ". ").replace(/\((.*?)\)\*/g, function(match, p1) {
        		return p1.toUpperCase();
            		}).replace(/0/g, "zero"), ",", ".");
            corrected = replaceLast(corrected, "  ", "").replace(/\,\./g, ".")
            console.warn("\"" + text + "\" is being pronounced phonetically as \"" + corrected + "\"");          
            responsiveVoice.speak(corrected, "UK English Male", {
            	onerror: function () {
                	alert("Sorry! There was an error reading the text.");
                    document.querySelector("#englishInputSpeak").style.pointerEvents = "auto";
                    document.querySelector("#mathInputSpeak").style.pointerEvents = "auto";
                    document.querySelector("#en-g").style.fill = "#ccc";
                    document.querySelector("#mg-g").style.fill = "#ccc";
                    document.querySelector("#en-p").style.cursor = "pointer";
                    document.querySelector("#mg-p").style.cursor = "pointer";
                },
                onstart: function () {
                    document.querySelector("#englishInputSpeak").style.pointerEvents = "none";
                    document.querySelector("#mathInputSpeak").style.pointerEvents = "none";
                    document.querySelector("#" + btn).style.fill = "#8f36f5";
                    document.querySelector("#en-p").style.cursor = "not-allowed";
                    document.querySelector("#mg-p").style.cursor = "not-allowed";
                },
                onend: function () {
                    document.querySelector("#englishInputSpeak").style.pointerEvents = "auto";
                    document.querySelector("#mathInputSpeak").style.pointerEvents = "auto";
                    document.querySelector("#en-g").style.fill = "#ccc";
                    document.querySelector("#mg-g").style.fill = "#ccc";
                    document.querySelector("#en-p").style.cursor = "pointer";
                    document.querySelector("#mg-p").style.cursor = "pointer";
                }
            });
        }
        
        document.getElementById("englishInput").value = localStorage.getItem("englishInput");
        document.getElementById("mathInput").value = localStorage.getItem("mathInput");
        
        checkForInput();
        
        console.log(
            '%cMathemoglyphics is a joke language created by 0201._ that replaces all English letters with a mathematical term. Apparently, math wizards like Alfred speak this on a regular basis and like to hide the fact that it exists. Words are separated by "　　" (a wide space) and "letters" are separated by "\\\\" (two backslashes). Enjoy! ... Wait, why in the realm of mathematics are you here? Return to your slumber party, you indentured servant! 😡',
            "background-image: linear-gradient(to top, violet, indigo, blue, green, yellow, orange, red); -webkit-background-clip: text; color: transparent; font-size: 20px;"
        );
    </script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=tkHmro1j"></script>
</body>

</html>
